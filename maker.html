<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Maker - Fsh Fonts</title>
    <meta property="og:title" content="Fsh Fonts">
    <meta name="twitter:title" content="Fsh Fonts">
    <meta name="description" content="Fsh Fonts, .">
    <meta property="og:description" content="Fsh Fonts, .">
    <meta name="twitter:description" content="Fsh Fonts, .">
    <!-- ------- -->
    <meta charset="UTF-8">
    <meta name="robots" content="index, follow">
    <meta property="og:locale" content="en">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://fsh.plus/fsh.png" type="image/png">
    <meta property="og:image" content="https://fsh.plus/fsh.png">
    <meta property="og:image:alt" content="Fsh logo">
    <meta name="twitter:image" content="https://fsh.plus/fsh.png">
    <meta name="theme-color" content="#a89c9b">
    <!-- ------- -->
    <link rel="stylesheet" href="https://fsh.plus/media/style.css">
    <script src="https://account.fsh.plus/script.js"></script>
    <!-- ------------------ -->
    <link rel="stylesheet" href="./media/maker.css">
  </head>
  <body>
    <dialog id="create-sub">
      <h2>Create substitution</h2>
      <label>Type: <select id="sub-type">
        <option value="1">Single (A->B)</option>
        <option value="2">Multiple (A->BB)</option>
        <option value="3">Alternate (A->a)</option>
        <option value="4" selected>Ligature (AA->B)</option>
      </select></label>
      <label>Feature: <select id="sub-feat"></select></label>
      <label>In: <input></label>
      <label>Out: <input></label>
      <button id="sub-make">Create</button>
    </dialog>
    <dialog id="edit-glyph">
      <div class="contain"></div>
      <div>
        <h2></h2>
        <label>Name: <input></label>
        <label>Advance: <input type="number"></label>
        <button>Change glyf</button>
      </div>
    </dialog>
    <nav>
      <a>
        <img src="https://fsh.plus/fsh.png" width="50" height="50" alt="Fsh logo">
        <h1>Fsh Fonts</h1>
      </a>
      <button onclick="window.showPage('settings')">Settings</button>
      <button onclick="window.showPage('glyphs')">Glyphs</button>
      <button onclick="window.showPage('export')">Export</button>
    </nav>
    <main>
      <div data-page="settings">
        <strong>Style</strong><br>
        <label>Weight: <input id="style-weight" type="range" min="1" max="1000" value="400"></label><span id="preview-weight">400 Normal</span><br>
        <label>Italic: <input id="style-italic" type="checkbox"></label><br>
        <label>Italic angle: <input id="style-italicAngle" type="number" value="-12.5" min="-360" max="360" step="0.5"></label><br>
        <label>Underline: <input id="style-underline" type="checkbox"></label><br>
        <label>Underline position: <input id="style-underlinePosition" type="number" value="100"></label><br>
        <label>Underline thickness: <input id="style-underlineThickness" type="number" value="1" min="0" max="1000"></label><br>
        <label>Strike position: <input id="style-strikePosition" type="number" value="50"></label><br>
        <label>Strike thickness: <input id="style-strikeThickness" type="number" value="1" min="0" max="1000"></label><br>
        <label>Width: <input id="style-width" type="range" min="1" max="9" value="5"></label><span id="preview-width">5 Medium</span><br>
        <label>Monospaced: <input id="style-monospaced" type="checkbox"></label><br>
        <label>Ascender: <input id="style-ascender" type="number" value="256"></label><br>
        <label>Descender: <input id="style-descender" type="number" value="256"></label><br>
        <label>Line gap: <input id="style-linegap" type="number" value="256"></label>
        <details>
          <summary>Advanced</summary>
          <label>Outline: <input id="style-outline" type="checkbox"></label><br>
          <label>Shadow: <input id="style-shadow" type="checkbox"></label><br>
          <label>Subscript X size: <input id="style-subXSize" type="number" value="90"></label><br>
          <label>Subscript Y size: <input id="style-subYSize" type="number" value="90"></label><br>
          <label>Subscript X offset: <input id="style-subXOff" type="number" value="0"></label><br>
          <label>Subscript Y offset: <input id="style-subYOff" type="number" value="166"></label><br>
          <label>Superscript X size: <input id="style-supXSize" type="number" value="90"></label><br>
          <label>Superscript Y size: <input id="style-supYSize" type="number" value="90"></label><br>
          <label>Superscript X offset: <input id="style-supXOff" type="number" value="0"></label><br>
          <label>Superscript Y offset: <input id="style-supYOff" type="number" value="0"></label>
        </details><br>
        <strong>Strings</strong><br>
        <label>Family: <input id="string-family" placeholder="Fontex"></label><br>
        <label>Subfamily: <input id="string-subfamily" placeholder="Regular"></label><br>
        <label>Version: <input id="string-version" placeholder="Version 1.0"></label><br>
        <label>Copyright: <input id="string-copyright" placeholder="Fsh"></label><br>
        <label>Designer: <input id="string-designer" placeholder="Jhon Font"></label><br>
        <label for="string-desc">Description:</label><br>
        <textarea id="string-desc"></textarea><br>
        <label for="string-license">License:</label><br>
        <textarea id="string-license"></textarea><br>
        <label>Sample text: <input id="string-sample" placeholder="The quick brown fox jumps over the lazy dog"></label><br><br>
        <strong>Other</strong><br>
        <label>Include glyph names: <input id="glyphNames" type="checkbox" checked></label><br>
        <label>Tag: <select id="tag">
          <option value="FSH ">FSH</option>
          <option value="    ">(none)</option>
        </select></label>
      </div>
      <div data-page="glyphs">
        <div>
          <h2>Glyphs</h2>
          <button onclick="window.createGlyph()">+</button>
        </div>
        <div class="list" id="glyph-list"></div>
        <div>
          <h2>Substitution / Ligatures</h2>
          <button onclick="window.createSub()">+</button>
        </div>
        <div class="list" id="sub-list"></div>
      </div>
      <div data-page="export">
        <select id="export-type">
          <option value="otf">OpenType (OTF)</option>
        </select>
        <button onclick="window.exportFont()">Download</button>
      </div>
    </main>
    <script src="./media/maker.js" type="module"></script>
  </body>
</html>
